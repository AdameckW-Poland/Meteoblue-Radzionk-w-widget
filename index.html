<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Meteoblue Radzionków Landscape</title>
    <style>
        /* Optymalizacja pod E-Ink i układ poziomy */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            background-color: white; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Kontener obracający widget o 90 stopni */
        .landscape-rotate {
            width: 600px;  /* Wysokość widgetu staje się szerokością po obrocie */
            height: 800px; /* Szerokość widgetu staje się wysokością po obrocie */
            transform: rotate(90deg);
            transform-origin: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            border: none;
            background: transparent;
            width: 800px;
            height: 600px;
        }
    </style>
</head>
<body>

    <div class="landscape-rotate">
        <iframe 
            src="https://www.meteoblue.com/pl/pogoda/widget/three/tarnowskie-g%c3%b3ry_polska_3083440?geoloc=fixed&nocurrent=0&noforecast=0&tempunit=CELSIUS&windunit=KILOMETER_PER_HOUR&days=4&layout=bright&user_key=2754db7e7c917be0&embed_key=aeb970bd70819080&sig=1447fed34346dbd83eed55fe86515d457430ac397c8d09f43b1f754f8abf64c6" 
            frameborder="0" 
            scrolling="NO" 
            allowtransparency="true" 
            sandbox="allow-same-origin allow-scripts allow-popups allow-popups-to-escape-sandbox">
        </iframe>
    </div>

    <script>
        // Odświeżanie co godzinę, aby dane były zawsze aktualne
        setTimeout(function() {
            location.reload();
        }, 3600000);
    </script>

</body>
</html>
